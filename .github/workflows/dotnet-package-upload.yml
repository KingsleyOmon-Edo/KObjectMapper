name: Upload dotnet package

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore KObjectMapper.slnx

      - name: Build
        run: dotnet build KObjectMapper.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test KObjectMapper.slnx --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/KObjectMapper/KObjectMapper.csproj --configuration Release --output artifacts/packages

      - name: Verify package exists
        run: |
          if ! ls artifacts/packages/*.nupkg 1> /dev/null 2>&1; then
            echo "No NuGet package was produced." >&2
            exit 1
          fi

      - name: Publish package to NuGet.org
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY is not configured." >&2
            exit 1
          fi

          dotnet nuget push artifacts/packages/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
