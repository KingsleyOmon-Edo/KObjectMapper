## This workflow will build a .NET project ...
## For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
#
name: Upload dotnet package

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: dotnet build --configuration Release src/KObjectMapper/KObjectMapper.csproj

      - name: Create package
        run: dotnet pack --configuration Release src/KObjectMapper/KObjectMapper.csproj --no-build

      - name: Publish package to NuGet.org
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY is not configured." >&2
            exit 1
          fi
          dotnet nuget push src/KObjectMapper/bin/Release/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
