# This workflow will build a .NET project ...
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET CI restore, build and test workflow

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore KObjectMapper.slnx

      - name: Build
        run: dotnet build KObjectMapper.slnx --configuration Debug --no-restore

      - name: Test
        run: dotnet test KObjectMapper.slnx --configuration Debug --no-build --verbosity normal
